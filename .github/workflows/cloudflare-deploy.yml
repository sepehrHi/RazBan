name: Deploy Cloudflare Worker

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/backend-cloudflare/**"
      - ".github/workflows/cloudflare-deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-cloudflare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: apps/backend-cloudflare/package.json

      - run: npm install

      # Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
      # Settings -> Secrets and variables -> Actions
      - name: Deploy to Cloudflare
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/backend-cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Skip notice
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "CLOUDFLARE_API_TOKEN secret not set - skipping deploy. Add it in repo Settings > Secrets and variables > Actions."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
